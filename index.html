<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolySolve Debug</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body{background:#000;color:#0f0;font-family:monospace;margin:0;padding:20px}
        .c{max-width:900px;margin:auto}
        .chat{background:#111;border:1px solid #0f0;height:500px;overflow-y:auto;padding:10px;margin:10px 0}
    </style>
</head>
<body>
<div class="c">
    <h1>PolySolve Debug Mode</h1>
    <div>
        Groq Key: <input type="text" id="k" style="width:60%">
        <button onclick="sK()">Save</button>
        <span id="ks"></span>
    </div>

    <div>
        <textarea id="ui" rows="2" style="width:100%" placeholder="Test prompt"></textarea>
        <button onclick="sm()">Send Test</button>
    </div>

    <div class="chat" id="cw"></div>
</div>

<script>
let k=localStorage.getItem('gK')||'';
if(k) document.getElementById('ks').innerHTML = 'Key loaded';

function sK(){k=document.getElementById('k').value.trim();if(k){localStorage.setItem('gK',k);document.getElementById('ks').innerHTML='Saved';}}

async function sm(){ 
    let p = document.getElementById('ui').value.trim();
    if(!p || !k) return alert('Need key and prompt');
    addM('You: ' + p);
    let l = addM('Connecting...');
    try {
        let res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${k}`, "Content-Type": "application/json"},
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                messages: [{role:"user", content: p}],
                max_tokens: 200
            })
        });
        let raw = await res.text();
        addM('Raw response: ' + raw.substring(0,500) + '...');
        let d = JSON.parse(raw);
        let r = d.choices?.[0]?.message?.content || 'No content';
        document.getElementById('cw').removeChild(l);
        addM('Groq: ' + r);
    } catch(e) {
        document.getElementById('cw').removeChild(l);
        addM('ERROR: ' + e.message);
    }
}

function addM(txt){ 
    let w = document.getElementById('cw');
    let m = document.createElement('div');
    m.innerHTML = txt.replace(/\n/g,'<br>');
    w.appendChild(m);
    w.scrollTop = w.scrollHeight;
}
</script>
</body>
</html>
